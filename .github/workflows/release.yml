name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-release:
    name: Validate release inputs
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      CARGO_BUILD_JOBS: 1
    outputs:
      package_version: ${{ steps.meta.outputs.package_version }}
      npm_tarball: ${{ steps.meta.outputs.npm_tarball }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: rust/trasgo -> target

      - name: Install Node dependencies
        run: npm ci

      - name: Check npm release surface
        run: npm run release:check

      - name: Run npm smoke tests
        run: npm test

      - name: Run packaged install smoke tests
        run: npm run test:package

      - name: Run Rust tests
        run: cargo test --manifest-path rust/trasgo/Cargo.toml -j 1

      - name: Verify tag and crate version alignment
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./package.json').version")"
          cargo="$(node -e "const fs=require('fs'); const text=fs.readFileSync('rust/trasgo/Cargo.toml','utf8'); const match=text.match(/^version\\s*=\\s*\"([^\"]+)\"/m); if (!match) { process.exit(2); } process.stdout.write(match[1]);")"
          if [ "$tag" != "$pkg" ]; then
            echo "Tag version ($tag) does not match package.json ($pkg)." >&2
            exit 1
          fi
          if [ "$pkg" != "$cargo" ]; then
            echo "package.json version ($pkg) does not match rust/trasgo/Cargo.toml ($cargo)." >&2
            exit 1
          fi

      - name: Pack npm tarball
        run: npm pack --json > npm-pack.json

      - name: Capture release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          pkg="$(node -p "require('./package.json').version")"
          tarball="$(node -e "const fs=require('fs'); const info=JSON.parse(fs.readFileSync('npm-pack.json','utf8'))[0]; process.stdout.write(info.filename);")"
          echo "package_version=$pkg" >> "$GITHUB_OUTPUT"
          echo "npm_tarball=$tarball" >> "$GITHUB_OUTPUT"

      - name: Upload npm package artifact
        uses: actions/upload-artifact@v6
        with:
          name: npm-package
          path: |
            npm-pack.json
            ${{ steps.meta.outputs.npm_tarball }}
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: validate-release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: npm-package
          path: dist/npm

      - name: Create release if missing
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release view "$TAG_NAME" >/dev/null 2>&1 || \
          gh release create "$TAG_NAME" --verify-tag --title "$TAG_NAME" --generate-notes

      - name: Upload release catalog and npm tarball
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          PACKAGE_VERSION: ${{ needs.validate-release.outputs.package_version }}
        shell: bash
        run: |
          set -euo pipefail
          cat > release-catalog.json <<EOF
{
  "family": "trasgo",
  "version": "${PACKAGE_VERSION}",
  "npm": {
    "package": "trasgo",
    "install": "npm install -g trasgo"
  },
  "native_targets": [
    {"platform": "linux", "arch": "x64", "surface": "cli"},
    {"platform": "linux", "arch": "arm64", "surface": "cli"},
    {"platform": "windows", "arch": "x64", "surface": "cli"},
    {"platform": "windows", "arch": "arm64", "surface": "cli"},
    {"platform": "macos", "arch": "x64", "surface": "cli"},
    {"platform": "macos", "arch": "arm64", "surface": "cli"}
  ],
  "mobile_targets": [
    {"platform": "android", "surface": "apk", "status": "published"},
    {"platform": "ios", "surface": "wrapper-project", "status": "published"}
  ],
  "notes": "Release lane validates Node and Rust surfaces, uploads the npm tarball, then publishes binaries and optional mobile assets."
}
EOF
          gh release upload "$TAG_NAME" release-catalog.json dist/npm/* --clobber

  publish-npm:
    name: Publish npm package
    needs:
      - validate-release
      - create-release
    if: ${{ secrets.NPM_TOKEN != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org/

      - name: Install Node dependencies
        run: npm ci

      - name: Re-run release checks
        run: npm run release:check

      - name: Run npm smoke tests
        run: npm test

      - name: Run packaged install smoke tests
        run: npm run test:package

      - name: Publish trasgo to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-binaries:
    name: Publish Native Binary (${{ matrix.id }})
    needs:
      - validate-release
      - create-release
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux-x64
            platform: linux
            arch: x64
            runner: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            binary_name: trasgo
            archive_ext: tar.gz
            package_shell: bash
            build_mode: native
          - id: linux-arm64
            platform: linux
            arch: arm64
            runner: ubuntu-latest
            rust_target: aarch64-unknown-linux-gnu
            binary_name: trasgo
            archive_ext: tar.gz
            package_shell: bash
            build_mode: cross-linux-arm64
          - id: windows-x64
            platform: windows
            arch: x64
            runner: windows-latest
            rust_target: x86_64-pc-windows-msvc
            binary_name: trasgo.exe
            archive_ext: zip
            package_shell: pwsh
            build_mode: native
          - id: windows-arm64
            platform: windows
            arch: arm64
            runner: windows-latest
            rust_target: aarch64-pc-windows-msvc
            binary_name: trasgo.exe
            archive_ext: zip
            package_shell: pwsh
            build_mode: cross-windows-arm64
          - id: macos-x64
            platform: macos
            arch: x64
            runner: macos-13
            rust_target: x86_64-apple-darwin
            binary_name: trasgo
            archive_ext: tar.gz
            package_shell: bash
            build_mode: native
          - id: macos-arm64
            platform: macos
            arch: arm64
            runner: macos-latest
            rust_target: aarch64-apple-darwin
            binary_name: trasgo
            archive_ext: tar.gz
            package_shell: bash
            build_mode: native

    env:
      CARGO_BUILD_JOBS: 1

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: rust/trasgo -> target
          key: ${{ matrix.id }}

      - name: Install Linux ARM64 linker
        if: matrix.build_mode == 'cross-linux-arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary on Unix
        if: matrix.package_shell == 'bash'
        shell: bash
        run: |
          set -euo pipefail
          target="${{ matrix.rust_target }}"
          if [ "${{ matrix.build_mode }}" = "cross-linux-arm64" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          cargo build --manifest-path rust/trasgo/Cargo.toml --release --target "$target" -j 1

      - name: Build release binary on Windows
        if: matrix.package_shell == 'pwsh'
        shell: pwsh
        run: |
          cargo build --manifest-path rust\trasgo\Cargo.toml --release --target ${{ matrix.rust_target }} -j 1

      - name: Package Unix artifact
        if: matrix.package_shell == 'bash'
        shell: bash
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          asset_os="${{ matrix.platform }}"
          asset_arch="${{ matrix.arch }}"
          artifact_base="trasgo-${asset_os}-${asset_arch}-${TAG_NAME}"
          rm -rf dist
          mkdir -p dist/payload
          cp "rust/trasgo/target/${{ matrix.rust_target }}/release/${{ matrix.binary_name }}" "dist/payload/${{ matrix.binary_name }}"
          cp README.md dist/payload/
          cp LICENSE dist/payload/
          asset="${artifact_base}.tar.gz"
          tar -C dist/payload -czf "$asset" .
          if command -v sha256sum >/dev/null 2>&1; then
            checksum="$(sha256sum "$asset" | awk '{print $1}')"
          else
            checksum="$(shasum -a 256 "$asset" | awk '{print $1}')"
          fi
          manifest="${asset}.manifest.json"
          checksum_file="${asset}.sha256"
          cat > "$manifest" <<EOF
{
  "artifact": "${asset}",
  "platform": "${asset_os}",
  "arch": "${asset_arch}",
  "binary": "trasgo",
  "mode": "release",
  "lane": "release",
  "checksum_sha256": "${checksum}"
}
EOF
          printf '%s  %s\n' "$checksum" "$asset" > "$checksum_file"
          {
            echo "ARTIFACT_NAME=${artifact_base}"
            echo "ASSET_PATH=${asset}"
            echo "MANIFEST_PATH=${manifest}"
            echo "CHECKSUM_PATH=${checksum_file}"
          } >> "$GITHUB_ENV"

      - name: Package Windows artifact
        if: matrix.package_shell == 'pwsh'
        shell: pwsh
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          $artifactBase = "trasgo-${{ matrix.platform }}-${{ matrix.arch }}-$env:TAG_NAME"
          if (Test-Path dist) {
            Remove-Item -Recurse -Force dist
          }
          New-Item -ItemType Directory -Force dist\payload | Out-Null
          Copy-Item "rust\trasgo\target\${{ matrix.rust_target }}\release\${{ matrix.binary_name }}" "dist\payload\${{ matrix.binary_name }}"
          Copy-Item README.md dist\payload\
          Copy-Item LICENSE dist\payload\
          $asset = "$artifactBase.zip"
          if (Test-Path $asset) {
            Remove-Item $asset -Force
          }
          Compress-Archive -Path dist\payload\* -DestinationPath $asset
          $hash = (Get-FileHash $asset -Algorithm SHA256).Hash.ToLower()
          $manifest = "$asset.manifest.json"
          $checksum = "$asset.sha256"
          @"
{
  "artifact": "$asset",
  "platform": "${{ matrix.platform }}",
  "arch": "${{ matrix.arch }}",
  "binary": "trasgo.exe",
  "mode": "release",
  "lane": "release",
  "checksum_sha256": "$hash"
}
"@ | Set-Content -Encoding utf8 $manifest
          "$hash  $asset" | Set-Content -Encoding ascii $checksum
          "ARTIFACT_NAME=$artifactBase" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ASSET_PATH=$asset" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "MANIFEST_PATH=$manifest" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CHECKSUM_PATH=$checksum" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: gh release upload "$TAG_NAME" "$ASSET_PATH" "$MANIFEST_PATH" "$CHECKSUM_PATH" --clobber

  publish-mobile-wrappers:
    name: Publish Mobile Wrappers
    needs:
      - validate-release
      - create-release
    if: ${{ hashFiles('mobile/trasgo-mobile/package.json') != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Package mobile wrapper projects
        run: |
          set -euo pipefail
          TAG_NAME="${{ github.ref_name }}"
          mkdir -p dist
          ios_asset="trasgo-ios-wrapper-${TAG_NAME}.zip"
          (
            cd mobile
            zip -r "../dist/${ios_asset}" trasgo-mobile >/dev/null
          )

      - name: Emit mobile wrapper manifest
        run: |
          set -euo pipefail
          cat > dist/mobile-wrapper-manifest.json <<'EOF'
          {
            "ios": {
              "surface": "expo-wrapper-project",
              "artifact_kind": "source-zip"
            },
            "note": "The iOS mobile release asset is a wrapper app project, not a signed store build."
          }
          EOF

      - name: Upload mobile wrapper artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mapfile -d '' files < <(find dist -type f \( -name '*.apk' -o -name '*.aab' -o -name '*.ipa' -o -name '*.zip' -o -name '*.json' \) -print0)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No mobile wrapper artifacts found; skipping mobile upload."
            exit 0
          fi
          gh release upload "$TAG_NAME" "${files[@]}" --clobber

  publish-android-apk:
    name: Publish Android APK
    needs:
      - validate-release
      - create-release
    if: ${{ hashFiles('mobile/trasgo-mobile/package.json') != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/trasgo-mobile/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install mobile dependencies
        working-directory: mobile/trasgo-mobile
        run: npm install --legacy-peer-deps

      - name: Generate Android project
        working-directory: mobile/trasgo-mobile
        run: npx expo prebuild --platform android --non-interactive

      - name: Point Gradle to Android SDK
        working-directory: mobile/trasgo-mobile/android
        run: echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties

      - name: Build debug APK
        working-directory: mobile/trasgo-mobile/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Package Android APK
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          apk_path="mobile/trasgo-mobile/android/app/build/outputs/apk/debug/app-debug.apk"
          asset="trasgo-android-apk-${TAG_NAME}.apk"
          cp "$apk_path" "dist/$asset"
          checksum="$(sha256sum "dist/$asset" | awk '{print $1}')"
          cat > "dist/${asset}.manifest.json" <<EOF
          {
            "artifact": "${asset}",
            "platform": "android",
            "arch": "universal",
            "surface": "apk",
            "variant": "debug",
            "checksum_sha256": "${checksum}",
            "note": "Sideloadable debug APK built from the Expo wrapper."
          }
          EOF
          printf '%s  %s\n' "$checksum" "$asset" > "dist/${asset}.sha256"

      - name: Upload Android APK
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          gh release upload "$TAG_NAME" dist/*.apk dist/*.json dist/*.sha256 --clobber
